name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate portfolio
        run: npm run validate

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage public site
        shell: bash
        run: |
          mkdir -p _site/assets _site/.well-known _site/it
          cp index.html 404.html sw.js site.webmanifest site-it.webmanifest robots.txt sitemap.xml humans.txt llms.txt llms-full.txt hire-me.txt _site/
          cp it/index.html _site/it/index.html
          cp -R assets/. _site/assets/
          cp .nojekyll _site/.nojekyll
          cp .well-known/security.txt _site/.well-known/security.txt
          test -s _site/it/index.html
          grep -q '<html lang="it"' _site/it/index.html
          grep -q 'href="https://mattian94.github.io/it/"' _site/it/index.html

      - name: Archive GitHub Pages artifact
        shell: bash
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory _site \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
